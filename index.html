
<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>欢迎访问我的网站</title>
  <style>
    /* 样式同上 */
  </style>
</head>
<body>
  <div id="container">
    <h1>欢迎来到我的网站</h1>
    <p>这是一个简单而美观的网站，用于展示我的作品和个人信息。</p>
    <hr>
    <h2>今日日志</h2>
    <form>
      <label for="log">添加日志：</label>
      <br>
      <textarea id="log" name="log" rows="6" cols="50"></textarea>
      <br>
      <label for="time">当前时间：</label>
      <input type="datetime-local" id="time" name="time">
      <br>
      <button type="submit">提交</button>
    </form>
  </div>
</body>
</html>
