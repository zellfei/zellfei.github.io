<!DOCTYPE html>
<html>
<head>
	<title>五一节日</title>
	<meta charset="utf-8">
	<style>
		body {
			background-color: #0072C6; /* 使用布鲁克蓝底背景 */
			color: #FFFFFF; /* 使用白色字体 */
			text-align: center; /* 使得文字居中 */
			font-size: 5em; /* 设置字体大小 */
			font-weight: bold; /* 设置字体为粗体 */
			margin-top: 50px; /* 设置上边距 */
		}
	</style>
</head>
<body>
    <!-- 五一 -->
	<span id="date"></span>
	<script>
        function updateDate(){
		// 获取当前日期
		var today = new Date();
		// 将日期格式化为YYYY年MM月DD日
		var formattedDate = today.getFullYear() + "年" + (today.getMonth() + 1) + "月" + today.getDate() + "日";
        var formattedTime = today.getHours() + '时' + (today.getMinutes()) + "分" + today.getSeconds() + "秒";
		// 将日期写入页面中
		document.getElementById("date").innerHTML = formattedDate + " " + formattedTime;
        }
        setTimeout(updateDate,1000)

        
	</script>
</body>
</html>
